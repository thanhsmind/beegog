name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # scripts/verify_all.mjs reads .bee/config.json `commands.verify` and
      # runs it verbatim — this is the single source of truth for the verify
      # chain, so CI can never drift from what a local session runs.
      - name: Run verify chain
        run: node scripts/verify_all.mjs
