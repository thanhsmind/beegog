name: Codex canary

# Nightly + on-demand real-codex proof that the INSTALLED bee hook chain
# (SessionStart, PreToolUse spawn_agent guard, PostToolUse state-sync,
# pre-Gate-3 write guard) actually fires under a live codex-cli, not just in
# unit tests against hooks/*.mjs source. See scripts/canary_codex.mjs for the
# probe list and isolation guarantees (advisor R7: every codex invocation
# runs against a per-run throwaway CODEX_HOME + fixture repo, never the
# runner's real ~/.codex).
#
# Deliberately NOT a push/PR gate: codex-cli is not installed on ubuntu-latest
# runners by default (see the commented install step below), so this job
# succeeds via the canary's own skip guard ("no codex binary") on a stock
# runner. It exists to catch behavior drift on a runner/environment that DOES
# have codex-cli installed (self-hosted, or once an official scripted install
# path exists for hosted runners), without ever blocking normal CI.
on:
  workflow_dispatch: {}
  schedule:
    # 03:00 UTC nightly.
    - cron: "0 3 * * *"

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # OPTIONAL: install codex-cli here once a scriptable, unattended install
      # path exists for a hosted GitHub Actions runner (today's official
      # install is an interactive/authenticated flow — see
      # docs/history/codex-native-runtime-v2/reports/capability-matrix.md).
      # Left as a documented placeholder: without this step, `codex` is
      # absent on PATH and scripts/canary_codex.mjs's own skip guard prints
      # "canary: skipped (no codex binary)" and exits 0 — the job still
      # succeeds, it just proves nothing on a stock runner. Example shape,
      # once such a path exists:
      #   - name: Install codex-cli
      #     run: <official unattended install command>
      #
      # Auth note: even with codex-cli installed, a real P1 turn additionally
      # needs credentials (CODEX_HOME/auth.json) to complete successfully.
      # scripts/canary_codex.mjs's P1 probe does NOT require this — it
      # observes the SessionStart hook's own side effect (a session record on
      # disk), which fires before any auth/API call, proven live while
      # building this canary. Credentials are only needed for a genuinely
      # complete round-trip reply, which this canary does not depend on.

      - name: Run codex canary
        run: node scripts/canary_codex.mjs
