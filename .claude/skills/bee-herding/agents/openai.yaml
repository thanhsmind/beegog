interface:
  display_name: "Bee Herding"
  short_description: "Drives the bee-herding cockpit's three roles: bootstrap is a one-shot setup a human invokes directly (no `--role` given) to pre-flight and turn the cockpit on, starting ONLY the dispatch loop; dispatch — enabled only once the owner creates an enable marker — picks the highest-impact ready backlog item, refuses unsafe or unclassifiable work, and starts a working agent in a fresh worktree via the herdr CLI; merge is an owner GESTURE run single-shot (not looped), finding worktrees finished by bee's own state, merging and cleaning them up, closing their runtime pane, and stopping cold — never retrying — on a red verify. Use bootstrap for that one direct human invocation; use dispatch/merge for exactly one control iteration at a time, in the role named by `--role dispatch|merge` — each invocation is fresh, with no memory of any earlier one."
policy:
  allow_implicit_invocation: true
